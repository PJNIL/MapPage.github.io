<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Map Reference Viewer & Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0d0f12;
    --bg-secondary: #141720;
    --bg-tertiary: #1a1e2a;
    --bg-elevated: #1f2435;
    --bg-hover: #252b3d;
    --border-dim: #2a3045;
    --border-active: #3d4663;
    --text-primary: #e2e6ef;
    --text-secondary: #8a92a8;
    --text-dim: #555d74;
    --accent-blue: #4a9eff;
    --accent-blue-dim: #2a5a99;
    --accent-green: #34d399;
    --accent-green-dim: #1a7a55;
    --accent-red: #f87171;
    --accent-red-dim: #7f1d1d;
    --accent-amber: #fbbf24;
    --accent-purple: #a78bfa;
    --accent-cyan: #22d3ee;
    --marker-size: 28px;
    --panel-width: 40%;
    --transition-fast: 0.15s ease;
    --transition-med: 0.25s ease;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    width: 100%; height: 100%;
  }

  #map-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-dim);
  }

  #detail-panel {
    width: var(--panel-width);
    min-width: 340px;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    overflow: hidden;
  }

  /* ── Top Bar ── */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(13,15,18,0.92) 0%, rgba(13,15,18,0.0) 100%);
    pointer-events: none;
  }
  #topbar > * { pointer-events: auto; }

  #topbar .title-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .title-area .logo {
    width: 22px; height: 22px;
    background: var(--accent-blue);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: #fff;
  }
  #topbar h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .mode-toggle {
    display: flex;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-toggle button {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: transparent;
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: all var(--transition-fast);
    letter-spacing: 0.3px;
  }
  .mode-toggle button.active {
    background: var(--accent-blue);
    color: #fff;
  }
  .mode-toggle button:hover:not(.active) {
    color: var(--text-primary);
    background: var(--bg-hover);
  }

  /* ── World Map Area ── */
  #map-container {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #map-container.panning { cursor: grabbing; }
  #map-container.edit-mode { cursor: crosshair; }
  #map-container.edit-mode.panning { cursor: grabbing; }

  #map-viewport {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  #world-image {
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    image-rendering: auto;
  }

  /* ── Connections (SVG lines) ── */
  #connections-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #connections-svg line {
    stroke: var(--accent-blue-dim);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: 0.5;
    transition: opacity var(--transition-fast);
  }
  #connections-svg line.highlight {
    stroke: var(--accent-cyan);
    stroke-width: 2.5;
    stroke-dasharray: none;
    opacity: 0.9;
  }

  /* ── Markers ── */
  .map-marker {
    position: absolute;
    z-index: 10;
    transform: translate(-50%, -100%);
    cursor: pointer;
    transition: filter var(--transition-fast);
    user-select: none;
  }
  .map-marker:hover { filter: brightness(1.3); z-index: 15; }
  .map-marker.selected { z-index: 20; filter: drop-shadow(0 0 8px var(--accent-cyan)); }
  .map-marker.dragging {
    z-index: 50;
    cursor: grabbing;
    transition: none;
    filter: drop-shadow(0 0 12px var(--accent-amber));
  }

  .marker-pin {
    position: relative;
    width: var(--marker-size);
    height: calc(var(--marker-size) * 1.35);
  }
  .marker-pin svg { width: 100%; height: 100%; }

  .marker-label {
    position: absolute;
    top: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-primary);
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
    letter-spacing: 0.3px;
    pointer-events: none;
  }

  /* ── Zoom Controls ── */
  .zoom-controls {
    position: absolute;
    bottom: 16px; left: 16px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .zoom-controls button {
    width: 36px; height: 36px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
    font-family: 'JetBrains Mono', monospace;
  }
  .zoom-controls button:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .zoom-controls button + button {
    border-top: 1px solid var(--border-dim);
  }

  .zoom-level {
    position: absolute;
    bottom: 16px; left: 62px;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 4px 8px;
  }

  /* ── Coordinate display ── */
  .coord-display {
    position: absolute;
    bottom: 16px; right: 16px;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(20,23,32,0.85);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 4px 8px;
  }

  /* ── Detail Panel ── */
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-header h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .panel-actions {
    display: flex; gap: 6px;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb {
    background: var(--border-dim);
    border-radius: 3px;
  }
  .panel-body::-webkit-scrollbar-thumb:hover {
    background: var(--border-active);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    gap: 12px;
  }
  .empty-state .icon {
    font-size: 40px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 12px;
    line-height: 1.6;
  }

  /* ── Detail View ── */
  .detail-image-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    margin-bottom: 16px;
    position: relative;
  }
  .detail-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .detail-image-wrap .no-image {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .detail-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .detail-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .detail-section {
    margin-bottom: 16px;
  }
  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .detail-value {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .faction-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }
  .faction-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .connected-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .connected-btn {
    padding: 5px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all var(--transition-fast);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .connected-btn:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(74,158,255,0.08);
  }

  .coord-badges {
    display: flex; gap: 8px;
  }
  .coord-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-tertiary);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
  }
  .coord-badge span { color: var(--accent-blue); }

  /* ── Edit Form ── */
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color var(--transition-fast);
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent-blue);
  }
  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }
  .form-input::placeholder, .form-textarea::placeholder {
    color: var(--text-dim);
  }

  .form-row {
    display: flex; gap: 10px;
  }
  .form-row .form-group { flex: 1; }

  /* ── Buttons ── */
  .btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all var(--transition-fast);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }
  .btn-primary:hover { background: #5aabff; }

  .btn-success {
    background: var(--accent-green-dim);
    border-color: var(--accent-green);
    color: var(--accent-green);
  }
  .btn-success:hover { background: #1d8f62; }

  .btn-danger {
    background: var(--accent-red-dim);
    border-color: var(--accent-red);
    color: var(--accent-red);
  }
  .btn-danger:hover { background: #991b1b; }

  .btn-ghost {
    background: transparent;
    border-color: var(--border-dim);
    color: var(--text-secondary);
  }
  .btn-ghost:hover {
    border-color: var(--border-active);
    background: var(--bg-hover);
  }

  .btn-sm { padding: 5px 10px; font-size: 10px; }
  .btn-block { width: 100%; justify-content: center; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    z-index: 9999;
    padding: 10px 24px;
    background: var(--accent-green);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--radius-md);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Edit mode indicator ── */
  .edit-indicator {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding: 5px 16px;
    background: rgba(251, 191, 36, 0.15);
    border: 1px solid var(--accent-amber);
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent-amber);
    letter-spacing: 0.5px;
    display: none;
    pointer-events: none;
  }
  .edit-indicator.visible { display: block; }

  /* ── Separator ── */
  .separator {
    height: 1px;
    background: var(--border-dim);
    margin: 16px 0;
  }

  /* ── Faction Colors ── */
  .faction-neutral { border-color: var(--text-dim); color: var(--text-secondary); }
  .faction-neutral .faction-dot { background: var(--text-dim); }
  .faction-alliance { border-color: var(--accent-blue); color: var(--accent-blue); }
  .faction-alliance .faction-dot { background: var(--accent-blue); }
  .faction-horde { border-color: var(--accent-red); color: var(--accent-red); }
  .faction-horde .faction-dot { background: var(--accent-red); }
  .faction-nature { border-color: var(--accent-green); color: var(--accent-green); }
  .faction-nature .faction-dot { background: var(--accent-green); }
  .faction-dark { border-color: var(--accent-purple); color: var(--accent-purple); }
  .faction-dark .faction-dot { background: var(--accent-purple); }
  .faction-ancient { border-color: var(--accent-amber); color: var(--accent-amber); }
  .faction-ancient .faction-dot { background: var(--accent-amber); }
  .faction-frost { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .faction-frost .faction-dot { background: var(--accent-cyan); }

  /* ── Scrollbar for panel ── */
  .panel-body { scrollbar-gutter: stable; }

  /* ── Panel footer ── */
  .panel-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border-dim);
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }

  .stats-bar {
    padding: 8px 20px;
    border-top: 1px solid var(--border-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .stats-bar span em {
    font-style: normal;
    color: var(--text-secondary);
  }
</style>
</head>
<body>

<div id="app">
  <!-- ═══ Left: Map Panel ═══ -->
  <div id="map-panel">
    <div id="topbar">
      <div class="title-area">
        <div class="logo">W</div>
        <h1>WORLD MAP EDITOR</h1>
      </div>
      <div class="mode-toggle">
        <button id="btn-viewer" class="active" onclick="setMode('viewer')">VIEWER</button>
        <button id="btn-editor" onclick="setMode('editor')">EDITOR</button>
      </div>
    </div>

    <div class="edit-indicator" id="edit-indicator">⚠ EDIT MODE — Drag markers to reposition</div>

    <div id="map-container">
      <div id="map-viewport">
        <img id="world-image" src="worldmap.png" alt="World Map" draggable="false">
        <svg id="connections-svg"></svg>
        <div id="markers-layer"></div>
      </div>
    </div>

    <div class="zoom-controls">
      <button onclick="zoomIn()" title="Zoom In">+</button>
      <button onclick="zoomOut()" title="Zoom Out">−</button>
      <button onclick="zoomReset()" title="Reset">⌂</button>
    </div>
    <div class="zoom-level" id="zoom-level">100%</div>
    <div class="coord-display" id="coord-display">X: 0.0% Y: 0.0%</div>
  </div>

  <!-- ═══ Right: Detail Panel ═══ -->
  <div id="detail-panel">
    <div class="panel-header">
      <h2 id="panel-title">Region Details</h2>
      <div class="panel-actions" id="panel-actions"></div>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state" id="empty-state">
        <div class="icon">🗺</div>
        <p>마커를 클릭하여<br>지역 정보를 확인하세요</p>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar">
      <span>Regions: <em id="stat-count">0</em></span>
      <span>Connections: <em id="stat-conn">0</em></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
//  mapData — 모든 지역 데이터 중앙 관리 객체
//  (편집 후 '데이터 코드 복사' 버튼으로 이 블록을 교체하세요)
// ════════════════════════════════════════════════════════════════
const mapData = {
  "elvenwood": {
    id: "elvenwood",
    name: "엘븐우드 숲",
    x: 22,
    y: 28,
    image: "images/elvenwood.png",
    faction: "nature",
    scenario: "고대 엘프들이 은둔한 신비의 숲. 세계수의 가지가 하늘을 뒤덮고, 자연의 정령들이 서식한다. 외부인의 접근을 허용하지 않는다.",
    connected: ["crossroad", "crystal_lake"]
  },
  "crossroad": {
    id: "crossroad",
    name: "십자로 마을",
    x: 38,
    y: 45,
    image: "images/crossroad.png",
    faction: "neutral",
    scenario: "대륙의 동서남북을 잇는 교역의 중심지. 다양한 세력의 상인과 모험가들이 뒤섞이는 자유 도시.",
    connected: ["elvenwood", "ironkeep", "ashlands", "crystal_lake"]
  },
  "ironkeep": {
    id: "ironkeep",
    name: "아이언킵 요새",
    x: 60,
    y: 32,
    image: "images/ironkeep.png",
    faction: "alliance",
    scenario: "강철 동맹의 군사 본거지. 난공불락의 성벽과 거대한 대장간이 있으며, 왕국 방위의 최전선이다.",
    connected: ["crossroad", "shadowmere"]
  },
  "shadowmere": {
    id: "shadowmere",
    name: "그림자 늪",
    x: 75,
    y: 55,
    image: "images/shadowmere.png",
    faction: "dark",
    scenario: "어둠의 마법사들이 지배하는 저주받은 늪지대. 독안개와 언데드가 떠돌며, 금지된 의식이 행해진다.",
    connected: ["ironkeep", "ashlands"]
  },
  "ashlands": {
    id: "ashlands",
    name: "잿빛 황야",

// ════════════════════════════════════════
//  State
// ════════════════════════════════════════
let mode = 'viewer';
let selectedId = null;
let mapImgW = 1920;
let mapImgH = 1080;

// Pan & Zoom state
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false;
let panStartX, panStartY, panStartPanX, panStartPanY;
const MIN_SCALE = 0.3;
const MAX_SCALE = 4;

// Drag state (edit mode)
let dragTarget = null;
let dragOffsetX, dragOffsetY;

// Faction meta
const factionMeta = {
  neutral:  { label: '중립',       color: '#555d74', cls: 'faction-neutral' },
  alliance: { label: '강철 동맹',  color: '#4a9eff', cls: 'faction-alliance' },
  horde:    { label: '부족 연합',  color: '#f87171', cls: 'faction-horde' },
  nature:   { label: '자연의 수호', color: '#34d399', cls: 'faction-nature' },
  dark:     { label: '어둠의 결사', color: '#a78bfa', cls: 'faction-dark' },
  ancient:  { label: '고대 문명',  color: '#fbbf24', cls: 'faction-ancient' },
  frost:    { label: '서리 군단',  color: '#22d3ee', cls: 'faction-frost' },
};

function getFactionColor(f) {
  return factionMeta[f]?.color || '#555d74';
}

// ════════════════════════════════════════
//  Init
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const img = document.getElementById('world-image');

  img.onload = () => {
    mapImgW = img.naturalWidth || 1920;
    mapImgH = img.naturalHeight || 1080;
    initViewport();
    renderAll();
  };
  img.onerror = () => {
    // If no worldmap.png, create placeholder
    mapImgW = 1920; mapImgH = 1080;
    img.style.width = mapImgW + 'px';
    img.style.height = mapImgH + 'px';
    img.style.background = 'linear-gradient(135deg, #0f1923 0%, #162030 30%, #1a2840 60%, #0d1520 100%)';
    img.alt = '';
    // Draw grid pattern
    const canvas = document.createElement('canvas');
    canvas.width = mapImgW; canvas.height = mapImgH;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, mapImgW, mapImgH);
    grad.addColorStop(0, '#0f1923');
    grad.addColorStop(0.3, '#162030');
    grad.addColorStop(0.6, '#1a2840');
    grad.addColorStop(1, '#0d1520');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, mapImgW, mapImgH);
    ctx.strokeStyle = 'rgba(74,158,255,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x < mapImgW; x += 96) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, mapImgH); ctx.stroke();
    }
    for (let y = 0; y < mapImgH; y += 96) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(mapImgW, y); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(74,158,255,0.04)';
    for (let x = 0; x < mapImgW; x += 96) {
      for (let y = 0; y < mapImgH; y += 96) {
        if ((x / 96 + y / 96) % 2 === 0) ctx.fillRect(x, y, 96, 96);
      }
    }
    // Label
    ctx.font = '600 14px JetBrains Mono, monospace';
    ctx.fillStyle = 'rgba(74,158,255,0.15)';
    ctx.textAlign = 'center';
    ctx.fillText('worldmap.png 이미지를 같은 폴더에 배치하세요', mapImgW/2, mapImgH/2);

    img.src = canvas.toDataURL();
    initViewport();
    renderAll();
  };

  // If image already cached
  if (img.complete && img.naturalWidth > 0) {
    mapImgW = img.naturalWidth;
    mapImgH = img.naturalHeight;
    initViewport();
    renderAll();
  }

  setupPanZoom();
});

function initViewport() {
  const vp = document.getElementById('map-viewport');
  const img = document.getElementById('world-image');
  img.style.width = mapImgW + 'px';
  img.style.height = mapImgH + 'px';
  vp.style.width = mapImgW + 'px';
  vp.style.height = mapImgH + 'px';

  // Fit map in container
  const container = document.getElementById('map-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  scale = Math.min(cw / mapImgW, ch / mapImgH) * 0.9;
  panX = (cw - mapImgW * scale) / 2;
  panY = (ch - mapImgH * scale) / 2;
  applyTransform();
}

function applyTransform() {
  const vp = document.getElementById('map-viewport');
  vp.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
}

// ════════════════════════════════════════
//  Pan & Zoom
// ════════════════════════════════════════
function setupPanZoom() {
  const container = document.getElementById('map-container');

  container.addEventListener('pointerdown', (e) => {
    if (e.button === 1 || (e.button === 0 && !isMarkerEl(e.target))) {
      if (mode === 'editor' && isMarkerEl(e.target)) return;
      isPanning = true;
      panStartX = e.clientX; panStartY = e.clientY;
      panStartPanX = panX; panStartPanY = panY;
      container.classList.add('panning');
      container.setPointerCapture(e.pointerId);
    }
  });

  container.addEventListener('pointermove', (e) => {
    // Update coord display
    updateCoordDisplay(e);

    if (isPanning) {
      panX = panStartPanX + (e.clientX - panStartX);
      panY = panStartPanY + (e.clientY - panStartY);
      applyTransform();
      return;
    }
    if (dragTarget) {
      handleDragMove(e);
    }
  });

  container.addEventListener('pointerup', (e) => {
    if (isPanning) {
      isPanning = false;
      container.classList.remove('panning');
    }
    if (dragTarget) {
      handleDragEnd(e);
    }
  });

  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const oldScale = scale;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * delta));

    panX = mx - (mx - panX) * (scale / oldScale);
    panY = my - (my - panY) * (scale / oldScale);
    applyTransform();
  }, { passive: false });
}

function isMarkerEl(el) {
  return el.closest('.map-marker') !== null;
}

function updateCoordDisplay(e) {
  const container = document.getElementById('map-container');
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const mapX = ((mx - panX) / scale / mapImgW * 100).toFixed(1);
  const mapY = ((my - panY) / scale / mapImgH * 100).toFixed(1);
  document.getElementById('coord-display').textContent = `X: ${mapX}%  Y: ${mapY}%`;
}

function zoomIn() {
  const container = document.getElementById('map-container');
  const cx = container.clientWidth / 2;
  const cy = container.clientHeight / 2;
  const old = scale;
  scale = Math.min(MAX_SCALE, scale * 1.3);
  panX = cx - (cx - panX) * (scale / old);
  panY = cy - (cy - panY) * (scale / old);
  applyTransform();
}
function zoomOut() {
  const container = document.getElementById('map-container');
  const cx = container.clientWidth / 2;
  const cy = container.clientHeight / 2;
  const old = scale;
  scale = Math.max(MIN_SCALE, scale / 1.3);
  panX = cx - (cx - panX) * (scale / old);
  panY = cy - (cy - panY) * (scale / old);
  applyTransform();
}
function zoomReset() { initViewport(); }

// ════════════════════════════════════════
//  Rendering
// ════════════════════════════════════════
function renderAll() {
  renderMarkers();
  renderConnections();
  updateStats();
  if (selectedId) {
    if (!mapData[selectedId]) selectedId = null;
    renderDetail();
  }
}

function renderMarkers() {
  const layer = document.getElementById('markers-layer');
  layer.innerHTML = '';
  Object.values(mapData).forEach(region => {
    const el = document.createElement('div');
    el.className = 'map-marker' + (region.id === selectedId ? ' selected' : '');
    el.dataset.id = region.id;
    el.style.left = (region.x / 100 * mapImgW) + 'px';
    el.style.top = (region.y / 100 * mapImgH) + 'px';

    const col = getFactionColor(region.faction);
    el.innerHTML = `
      <div class="marker-pin">
        <svg viewBox="0 0 28 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 24 14 24s14-13.5 14-24C28 6.268 21.732 0 14 0z" fill="${col}"/>
          <circle cx="14" cy="13" r="6" fill="rgba(0,0,0,0.3)"/>
          <circle cx="14" cy="13" r="4" fill="#fff" opacity="0.9"/>
        </svg>
      </div>
      <div class="marker-label">${region.name}</div>
    `;

    el.addEventListener('pointerdown', (e) => {
      if (mode === 'editor') {
        e.stopPropagation();
        handleDragStart(e, region.id);
      }
    });
    el.addEventListener('click', (e) => {
      if (!dragTarget) {
        selectRegion(region.id);
      }
    });
    layer.appendChild(el);
  });
}

function renderConnections() {
  const svg = document.getElementById('connections-svg');
  svg.setAttribute('width', mapImgW);
  svg.setAttribute('height', mapImgH);
  svg.style.width = mapImgW + 'px';
  svg.style.height = mapImgH + 'px';
  svg.innerHTML = '';

  const drawn = new Set();
  Object.values(mapData).forEach(region => {
    (region.connected || []).forEach(targetId => {
      const target = mapData[targetId];
      if (!target) return;
      const key = [region.id, targetId].sort().join('|');
      if (drawn.has(key)) return;
      drawn.add(key);

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', region.x / 100 * mapImgW);
      line.setAttribute('y1', region.y / 100 * mapImgH);
      line.setAttribute('x2', target.x / 100 * mapImgW);
      line.setAttribute('y2', target.y / 100 * mapImgH);

      if (selectedId && (region.id === selectedId || targetId === selectedId)) {
        line.classList.add('highlight');
      }
      svg.appendChild(line);
    });
  });
}

// ════════════════════════════════════════
//  Selection & Detail Panel
// ════════════════════════════════════════
function selectRegion(id) {
  selectedId = id;
  renderMarkers();
  renderConnections();
  renderDetail();

  // Center on marker
  const region = mapData[id];
  if (region) {
    const container = document.getElementById('map-container');
    const px = region.x / 100 * mapImgW;
    const py = region.y / 100 * mapImgH;
    panX = container.clientWidth / 2 - px * scale;
    panY = container.clientHeight / 2 - py * scale;
    applyTransform();
  }
}

function renderDetail() {
  const body = document.getElementById('panel-body');
  const actions = document.getElementById('panel-actions');

  if (!selectedId || !mapData[selectedId]) {
    if (mode === 'editor') {
      actions.innerHTML = `
        <button class="btn btn-success btn-sm" onclick="addRegion()">+ 신규 지역</button>
        <button class="btn btn-primary btn-sm" onclick="copyDataCode()">📋 데이터 코드 복사</button>
      `;
      body.innerHTML = `
        <div class="empty-state">
          <div class="icon">✏️</div>
          <p>마커를 클릭하여 편집하거나<br>아래 버튼으로 새 지역을 추가하세요</p>
          <button class="btn btn-success" onclick="addRegion()" style="margin-top:8px;font-size:13px;padding:10px 24px;">+ 신규 지역 추가</button>
        </div>
      `;
    } else {
      actions.innerHTML = '';
      body.innerHTML = `<div class="empty-state"><div class="icon">🗺</div><p>마커를 클릭하여<br>지역 정보를 확인하세요</p></div>`;
    }
    return;
  }

  if (mode === 'viewer') {
    renderViewerDetail();
  } else {
    renderEditorDetail();
  }
}

function renderEditorDetail() {
  const region = mapData[selectedId];
  const body = document.getElementById('panel-body');
  const actions = document.getElementById('panel-actions');

  const factionOptions = Object.entries(factionMeta).map(([k, v]) =>
    `<option value="${k}" ${region.faction === k ? 'selected' : ''}>${v.label} (${k})</option>`
  ).join('');

  const allIds = Object.keys(mapData).filter(id => id !== selectedId);
  const connectedSet = new Set(region.connected || []);
  const connCheckboxes = allIds.map(id => {
    const r = mapData[id];
    return `<label style="display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;font-size:12px;color:var(--text-secondary);">
      <input type="checkbox" ${connectedSet.has(id) ? 'checked' : ''} value="${id}" onchange="toggleConnection('${id}', this.checked)">
      ${r.name} <span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px">(${id})</span>
    </label>`;
  }).join('');

  body.innerHTML = `
    <div class="form-group">
      <label>지역 ID</label>
      <input class="form-input" value="${region.id}" disabled style="opacity:0.5;cursor:not-allowed">
    </div>

    <div class="form-group">
      <label>지역 이름</label>
      <input class="form-input" value="${region.name}" oninput="updateField('name', this.value)">
    </div>

      <label>이미지 경로</label>
      <input class="form-input" value="${region.image}" placeholder="images/region.png" oninput="updateField('image', this.value)">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>X 좌표 (%)</label>
        <input class="form-input" type="number" step="0.1" min="0" max="100" value="${region.x.toFixed(1)}" oninput="updateCoord('x', parseFloat(this.value))">
      </div>
      <div class="form-group">
        <label>Y 좌표 (%)</label>
        <input class="form-input" type="number" step="0.1" min="0" max="100" value="${region.y.toFixed(1)}" oninput="updateCoord('y', parseFloat(this.value))">
      </div>
    </div>

    <div class="form-group">
      <label>세력</label>
      <select class="form-input" onchange="updateField('faction', this.value)">${factionOptions}</select>
    </div>

    <div class="form-group">
      <label>시나리오 / 컨셉</label>
      <textarea class="form-textarea" oninput="updateField('scenario', this.value)">${region.scenario || ''}</textarea>
    </div>

    <div class="form-group">
      <label>연결된 지역</label>
      <div style="background:var(--bg-tertiary);border:1px solid var(--border-dim);border-radius:var(--radius-sm);padding:8px 10px;max-height:160px;overflow-y:auto;">
        ${connCheckboxes || '<span style="color:var(--text-dim);font-size:12px;">다른 지역이 없습니다</span>'}
      </div>

  actions.innerHTML = `
    <button class="btn btn-success btn-sm" onclick="addRegion()">+ 신규 지역</button>
    <button class="btn btn-primary btn-sm" onclick="copyDataCode()">📋 데이터 코드 복사</button>
  `;
}

// ════════════════════════════════════════
//  Edit operations
// ════════════════════════════════════════
function updateField(field, value) {
  if (!selectedId || !mapData[selectedId]) return;
  mapData[selectedId][field] = value;
  if (field === 'name' || field === 'faction') {
    renderMarkers();
  }
}

function updateCoord(axis, value) {
  if (!selectedId || !mapData[selectedId]) return;
  if (isNaN(value)) return;
  mapData[selectedId][axis] = Math.max(0, Math.min(100, value));
  renderMarkers();
  renderConnections();
}

function toggleConnection(targetId, checked) {
  if (!selectedId || !mapData[selectedId]) return;
  const region = mapData[selectedId];
  if (!region.connected) region.connected = [];

  if (checked) {
    if (!region.connected.includes(targetId)) region.connected.push(targetId);
    // bidirectional
    if (!mapData[targetId].connected) mapData[targetId].connected = [];
    if (!mapData[targetId].connected.includes(selectedId)) mapData[targetId].connected.push(selectedId);
  } else {
    region.connected = region.connected.filter(id => id !== targetId);
    if (mapData[targetId]?.connected) {
      mapData[targetId].connected = mapData[targetId].connected.filter(id => id !== selectedId);
    }
  }
  renderConnections();
  updateStats();
}

function addRegion() {
  let newId = 'region_' + Date.now().toString(36);
  const promptId = prompt('새 지역 ID를 입력하세요 (영문, 숫자, 언더스코어):', newId);
  if (!promptId) return;
  newId = promptId.trim().replace(/[^a-zA-Z0-9_]/g, '_');
  if (mapData[newId]) {
    alert('이미 존재하는 ID입니다.');
    return;
  }
  mapData[newId] = {
    id: newId,
    name: '새 지역',
    x: 50,
    y: 50,
    image: '',
    faction: 'neutral',
    scenario: '',
    connected: []
  };
  selectedId = newId;
  renderAll();
  showToast('새 지역이 추가되었습니다');
}

function deleteRegion() {
  if (!selectedId || !mapData[selectedId]) return;
  const name = mapData[selectedId].name;
  if (!confirm(`"${name}" 지역을 삭제하시겠습니까?`)) return;

  // Remove from other regions' connections
  Object.values(mapData).forEach(r => {
    if (r.connected) {
      r.connected = r.connected.filter(id => id !== selectedId);
    }
  });
  delete mapData[selectedId];
  selectedId = null;
  renderAll();
  showToast(`"${name}" 지역이 삭제되었습니다`);
}

// ════════════════════════════════════════
//  Data Export
// ════════════════════════════════════════
function copyDataCode() {
  const entries = Object.entries(mapData).map(([key, val]) => {
    const obj = {
      id: val.id,
      name: val.name,
      x: Math.round(val.x * 10) / 10,
      y: Math.round(val.y * 10) / 10,
      image: val.image,
      faction: val.faction,
      scenario: val.scenario,
      connected: val.connected || []
    };
    return `  "${key}": ${JSON.stringify(obj, null, 4).split('\n').map((l, i) => i === 0 ? l : '  ' + l).join('\n')}`;
  });

  const code = `const mapData = {\n${entries.join(',\n')}\n};`;

  navigator.clipboard.writeText(code).then(() => {
    showToast('✅ mapData 코드가 클립보드에 복사되었습니다!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ mapData 코드가 클립보드에 복사되었습니다!');
  });
}

// ════════════════════════════════════════
//  Drag & Drop (Edit Mode)
// ════════════════════════════════════════
let dragStarted = false;
let dragStartX, dragStartY;

function handleDragStart(e, id) {
  if (mode !== 'editor') return;
  dragTarget = id;
  dragStarted = false;
  dragStartX = e.clientX;
  dragStartY = e.clientY;

  const markerEl = e.target.closest('.map-marker');
  if (markerEl) {
    const container = document.getElementById('map-container');
    container.setPointerCapture(e.pointerId);
  }
}

function handleDragMove(e) {
  if (!dragTarget) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (!dragStarted && Math.abs(dx) + Math.abs(dy) < 5) return;
  dragStarted = true;

  const container = document.getElementById('map-container');
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const mapXpx = (mx - panX) / scale;
  const mapYpx = (my - panY) / scale;

  const xPct = Math.max(0, Math.min(100, mapXpx / mapImgW * 100));
  const yPct = Math.max(0, Math.min(100, mapYpx / mapImgH * 100));

  mapData[dragTarget].x = xPct;
  mapData[dragTarget].y = yPct;

  // Update marker position directly (no full re-render for perf)
  const markerEl = document.querySelector(`.map-marker[data-id="${dragTarget}"]`);
  if (markerEl) {
    markerEl.style.left = (xPct / 100 * mapImgW) + 'px';
    markerEl.style.top = (yPct / 100 * mapImgH) + 'px';
    markerEl.classList.add('dragging');
  }
  renderConnections();
}

function handleDragEnd(e) {
  if (!dragTarget) return;
  const id = dragTarget;
  const wasDrag = dragStarted;
  dragTarget = null;
  dragStarted = false;

  const markerEl = document.querySelector(`.map-marker[data-id="${id}"]`);
  if (markerEl) markerEl.classList.remove('dragging');

  if (wasDrag) {
    // Refresh the editor form if this is the selected region
    if (selectedId === id) renderDetail();
    renderMarkers();
  } else {
    selectRegion(id);
  }
}

// ════════════════════════════════════════
//  Mode Switching
// ════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('btn-viewer').classList.toggle('active', m === 'viewer');
  document.getElementById('btn-editor').classList.toggle('active', m === 'editor');
  document.getElementById('edit-indicator').classList.toggle('visible', m === 'editor');
  document.getElementById('map-container').classList.toggle('edit-mode', m === 'editor');

  document.getElementById('panel-title').textContent = m === 'viewer' ? 'Region Details' : 'Region Editor';
  renderDetail();
}

// ════════════════════════════════════════
//  Utilities
// ════════════════════════════════════════
function updateStats() {
  const regions = Object.keys(mapData).length;
  const connSet = new Set();
  Object.values(mapData).forEach(r => {
    (r.connected || []).forEach(cid => {
      connSet.add([r.id, cid].sort().join('|'));
    });
  });
  document.getElementById('stat-count').textContent = regions;
  document.getElementById('stat-conn').textContent = connSet.size;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
