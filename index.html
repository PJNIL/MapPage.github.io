<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Map Reference Viewer & Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0c10; --bg-secondary: #10131a; --bg-tertiary: #161b26;
    --bg-hover: #1e2433; --bg-card: #141821; --bg-elevated: #1a1f2e;
    --border-dim: #1e2536; --border-active: #2e3650; --border-glow: rgba(74,158,255,0.2);
    --text-primary: #e8ecf4; --text-secondary: #8892aa; --text-dim: #4a5268;
    --accent-blue: #4a9eff; --accent-blue-soft: rgba(74,158,255,0.1);
    --accent-green: #34d399; --accent-green-dim: #1a7a55;
    --accent-red: #f87171; --accent-red-dim: #7f1d1d;
    --accent-amber: #fbbf24; --accent-amber-soft: rgba(251,191,36,0.1);
    --accent-purple: #a78bfa;
    --marker-size: 28px;
    --marker-font-size: 13px;
    --panel-width: 40%; --transition-fast: 0.18s ease;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 20px rgba(74,158,255,0.15);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-primary); color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; line-height: 1.5;
  }

  /* ══ Global Tab Bar ══ */
  #global-tabs {
    display: flex; align-items: center; gap: 2px;
    padding: 6px 16px; height: 44px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0; z-index: 200;
  }
  .gtab-brand { display: flex; align-items: center; gap: 8px; margin-right: 20px; }
  .gtab-logo {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, #4a9eff, #a78bfa);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 13px; color: #fff;
    box-shadow: 0 2px 12px rgba(74,158,255,0.3);
  }
  .gtab-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.3px; }
  .gtab-btn {
    padding: 6px 18px; border-radius: 8px;
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
    background: transparent; color: var(--text-dim); border: none;
    cursor: pointer; transition: all 0.2s; position: relative;
    letter-spacing: 0.3px;
  }
  .gtab-btn:hover { color: var(--text-secondary); background: var(--bg-hover); }
  .gtab-btn.active { color: var(--accent-blue); background: var(--accent-blue-soft); }
  .gtab-btn.active::after {
    content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px; background: var(--accent-blue); border-radius: 2px;
  }
  .gtab-spacer { flex: 1; }
  .gtab-right { display: flex; align-items: center; gap: 8px; }

  #app-root { display: flex; flex-direction: column; width: 100%; height: 100%; }
  .tab-content { flex: 1; display: none; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* ══ Map Tab ══ */
  #tab-map { display: flex; width: 100%; height: 100%; }
  #map-panel { flex: 1; position: relative; overflow: hidden; background: var(--bg-secondary); }
  #detail-panel {
    width: var(--panel-width); min-width: 360px; max-width: 520px;
    display: flex; flex-direction: column; background: var(--bg-primary);
    border-left: 1px solid var(--border-dim);
  }

  /* Top Bar (map only) */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(10,12,16,0.96) 0%, rgba(10,12,16,0) 100%);
    pointer-events: none;
  }
  #topbar > * { pointer-events: auto; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  /* Filter Bar */
  #filter-bar {
    position: absolute; top: 52px; left: 16px; z-index: 90;
    display: flex; gap: 5px; flex-wrap: wrap; max-width: 65%; pointer-events: auto;
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: 'Outfit', sans-serif;
    background: rgba(22,27,38,0.85); border: 1px solid var(--border-dim);
    color: var(--text-dim); cursor: pointer; transition: all 0.2s;
    backdrop-filter: blur(8px); letter-spacing: 0.2px;
  }
  .filter-btn:hover { border-color: var(--border-active); color: var(--text-secondary); }
  .filter-btn.active {
    border-color: color-mix(in srgb, var(--c) 60%, transparent);
    background: color-mix(in srgb, var(--c) 15%, transparent);
    color: var(--c); text-shadow: 0 0 12px color-mix(in srgb, var(--c) 30%, transparent);
  }

  .sync-status {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    border: 1px solid; transition: all 0.25s;
    backdrop-filter: blur(8px);
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sync-status.connected { border-color: var(--accent-green-dim); color: var(--accent-green); background: rgba(26,122,85,0.1); }
  .sync-status.connected .sync-dot { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
  .sync-status.disconnected { border-color: var(--border-dim); color: var(--text-dim); }
  .sync-status.disconnected .sync-dot { background: var(--text-dim); }
  .sync-status.saving { border-color: var(--accent-amber); color: var(--accent-amber); background: var(--accent-amber-soft); }
  .sync-status.saving .sync-dot { background: var(--accent-amber); animation: pulse 1s infinite; }
  .sync-status.error { border-color: var(--accent-red-dim); color: var(--accent-red); }
  .sync-status.error .sync-dot { background: var(--accent-red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn-icon {
    width: 34px; height: 34px; background: rgba(22,27,38,0.85); border: 1px solid var(--border-dim);
    border-radius: 8px; color: var(--text-secondary); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast); backdrop-filter: blur(8px);
  }
  .btn-icon:hover { border-color: var(--border-active); color: var(--text-primary); background: var(--bg-hover); }
  .unsaved-dot {
    width: 8px; height: 8px; background: var(--accent-amber); border-radius: 50%;
    display: none; box-shadow: 0 0 8px var(--accent-amber);
  }
  .unsaved-dot.visible { display: block; }

  .mode-toggle {
    display: flex; background: rgba(22,27,38,0.85); border: 1px solid var(--border-dim);
    border-radius: 8px; overflow: hidden; backdrop-filter: blur(8px);
  }
  .mode-toggle button {
    padding: 6px 16px; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600;
    background: transparent; color: var(--text-dim); border: none; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .mode-toggle button.active { background: var(--accent-blue); color: #fff; box-shadow: 0 2px 10px rgba(74,158,255,0.3); }
  .mode-toggle button:hover:not(.active) { color: var(--text-primary); background: var(--bg-hover); }

  /* Map */
  #map-container { width: 100%; height: 100%; position: relative; overflow: hidden; cursor: grab; }
  #map-container.panning { cursor: grabbing; }
  #map-container.edit-mode { cursor: crosshair; }
  #map-container.edit-mode.panning { cursor: grabbing; }
  #map-viewport { position: absolute; transform-origin: 0 0; will-change: transform; }
  #world-image { display: block; user-select: none; -webkit-user-drag: none; }
  #connections-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  #connections-svg line { stroke: rgba(74,158,255,0.15); stroke-width: 1.5; stroke-dasharray: 6 4; opacity: 0.6; }
  #connections-svg line.highlight { stroke: var(--accent-blue); stroke-width: 2; stroke-dasharray: none; opacity: 0.8; }

  .map-marker {
    position: absolute; z-index: 10; transform: translate(-50%, -100%);
    cursor: pointer; transition: filter 0.15s, transform 0.15s; user-select: none;
  }
  .map-marker:hover { filter: brightness(1.3); z-index: 15; transform: translate(-50%, -100%) scale(1.1); }
  .map-marker.selected { z-index: 20; filter: drop-shadow(0 0 10px var(--accent-blue)); }
  .map-marker.dragging { z-index: 50; cursor: grabbing; transition: none; filter: drop-shadow(0 0 14px var(--accent-amber)); }
  .marker-pin { position: relative; width: var(--marker-size); height: calc(var(--marker-size) * 1.35); }
  .marker-pin svg { width: 100%; height: 100%; }
  .marker-label {
    position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
    white-space: nowrap; font-family: 'Noto Sans KR', sans-serif;
    font-size: var(--marker-font-size); font-weight: 700; color: var(--text-primary);
    text-shadow: 0 1px 6px rgba(0,0,0,0.95), 0 0 3px rgba(0,0,0,1); pointer-events: none;
  }

  .zoom-controls {
    position: absolute; bottom: 20px; left: 20px; z-index: 100;
    display: flex; flex-direction: column; gap: 1px;
    background: rgba(22,27,38,0.9); border: 1px solid var(--border-dim);
    border-radius: var(--radius-md); overflow: hidden; backdrop-filter: blur(8px);
    box-shadow: var(--shadow-sm);
  }
  .zoom-controls button {
    width: 38px; height: 38px; background: transparent; border: none;
    color: var(--text-secondary); font-size: 17px; cursor: pointer; transition: all 0.15s;
  }
  .zoom-controls button:hover { background: var(--bg-hover); color: var(--text-primary); }
  .zoom-level {
    position: absolute; bottom: 20px; left: 68px; z-index: 100;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    background: rgba(22,27,38,0.9); border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm); padding: 5px 10px; backdrop-filter: blur(8px);
  }

  /* Panel */
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border-dim);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    background: var(--bg-primary);
  }
  .panel-header h2 {
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-secondary); text-transform: uppercase; margin: 0; letter-spacing: 0.5px;
  }
  .panel-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; scrollbar-gutter: stable; }
  .panel-body::-webkit-scrollbar { width: 5px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); text-align: center; gap: 14px;
  }
  .empty-state .icon { font-size: 44px; opacity: 0.25; }

  .detail-image-wrap {
    width: 100%; height: 260px; border-radius: var(--radius-md); overflow: hidden;
    background: var(--bg-tertiary); border: 1px solid var(--border-dim); margin-bottom: 18px;
    cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .detail-image-wrap:hover { border-color: var(--accent-blue); box-shadow: var(--shadow-glow); }
  .detail-image-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .detail-name { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
  .detail-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 18px; }
  .detail-section { margin-bottom: 18px; }
  .detail-label {
    font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 7px; letter-spacing: 0.8px;
  }
  .detail-value { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

  .badge-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .info-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid; font-family: 'Outfit', sans-serif; letter-spacing: 0.2px;
  }
  .faction-dot { width: 7px; height: 7px; border-radius: 50%; }

  .connected-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .connected-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
    font-family: 'Outfit', sans-serif; background: var(--bg-tertiary);
    border: 1px solid var(--border-dim); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
  }
  .connected-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); background: var(--accent-blue-soft); }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm); color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 9px 12px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-soft);
  }
  .form-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .form-row { display: flex; gap: 10px; align-items: center; }
  .form-row .form-group { flex: 1; margin-bottom: 0; }
  input[type="color"] {
    padding: 2px; width: 36px; height: 36px; cursor: pointer;
    border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
    background: var(--bg-tertiary); flex-shrink: 0;
  }

  /* Buttons */
  .btn {
    padding: 7px 16px; border-radius: var(--radius-sm);
    font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid; transition: all 0.2s;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px; letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; box-shadow: 0 2px 10px rgba(74,158,255,0.2); }
  .btn-primary:hover { background: #5aabff; box-shadow: 0 4px 16px rgba(74,158,255,0.3); }
  .btn-success { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }
  .btn-success:hover { background: #1d8f62; }
  .btn-danger { background: rgba(127,29,29,0.3); border-color: rgba(248,113,113,0.4); color: var(--accent-red); }
  .btn-danger:hover { background: rgba(127,29,29,0.5); }
  .btn-ghost { background: transparent; border-color: var(--border-dim); color: var(--text-secondary); }
  .btn-ghost:hover { border-color: var(--border-active); background: var(--bg-hover); color: var(--text-primary); }
  .btn-sm { padding: 5px 12px; font-size: 10px; }
  .btn-block { width: 100%; }
  .btn-icon-sm {
    width: 26px; height: 26px; font-size: 12px; padding: 0; border-radius: 6px;
    border: 1px solid transparent; background: transparent; color: var(--text-dim); cursor: pointer;
  }
  .btn-icon-sm:hover { color: var(--text-primary); background: var(--bg-hover); border-color: var(--border-dim); }
  .separator { height: 1px; background: var(--border-dim); margin: 18px 0; }

  .stats-bar {
    padding: 10px 20px; border-top: 1px solid var(--border-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    display: flex; gap: 18px; flex-shrink: 0; background: var(--bg-primary);
  }
  .stats-bar span em { font-style: normal; color: var(--text-secondary); }

  /* Data Tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; }
  .data-table th, .data-table td { border: 1px solid var(--border-dim); padding: 6px 10px; text-align: left; }
  .data-table th {
    background: var(--bg-tertiary); color: var(--text-dim); font-weight: 700;
    font-family: 'Outfit', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .data-table td { color: var(--text-secondary); }

  /* ══ Search Modal ══ */
  .search-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .search-overlay.open { opacity: 1; pointer-events: auto; }
  .search-box {
    width: 580px; max-width: 94vw; background: var(--bg-secondary);
    border: 1px solid var(--border-dim); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); overflow: hidden;
    transform: translateY(16px) scale(0.97); transition: transform 0.25s;
  }
  .search-overlay.open .search-box { transform: translateY(0) scale(1); }
  .search-input-wrap {
    display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    border-bottom: 1px solid var(--border-dim);
  }
  .search-input-wrap .search-icon { font-size: 18px; color: var(--text-dim); flex-shrink: 0; }
  .search-input-wrap input {
    flex: 1; background: none; border: none; color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px; outline: none;
  }
  .search-input-wrap input::placeholder { color: var(--text-dim); }
  .search-tabs {
    display: flex; gap: 2px; padding: 8px 20px; border-bottom: 1px solid var(--border-dim);
  }
  .search-tab {
    padding: 5px 14px; border-radius: 6px; font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 600; border: none; cursor: pointer;
    background: transparent; color: var(--text-dim); transition: all 0.15s;
  }
  .search-tab.active { background: var(--accent-blue-soft); color: var(--accent-blue); }
  .search-tab:hover:not(.active) { color: var(--text-secondary); background: var(--bg-hover); }
  .search-results {
    max-height: 400px; overflow-y: auto; padding: 8px;
  }
  .search-results::-webkit-scrollbar { width: 5px; }
  .search-results::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
  .search-result-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px; border-radius: var(--radius-md); cursor: pointer;
    transition: background 0.12s;
  }
  .search-result-item:hover { background: var(--bg-hover); }
  .sr-icon {
    width: 36px; height: 36px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
    background: var(--bg-tertiary); border: 1px solid var(--border-dim);
  }
  .sr-info { flex: 1; min-width: 0; }
  .sr-name { font-weight: 600; font-size: 13px; color: var(--text-primary); }
  .sr-name mark { background: rgba(74,158,255,0.2); color: var(--accent-blue); border-radius: 2px; padding: 0 2px; }
  .sr-meta { font-size: 11px; color: var(--text-dim); margin-top: 1px; display: flex; gap: 8px; }
  .sr-region {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    padding: 3px 10px; border-radius: 10px; background: var(--bg-tertiary);
    flex-shrink: 0;
  }
  .search-empty { padding: 32px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* ══ Dungeon Browser Tab ══ */
  #tab-dungeon { flex-direction: column; background: var(--bg-primary); }
  .dungeon-header {
    padding: 20px 28px; border-bottom: 1px solid var(--border-dim);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .dungeon-header h2 {
    font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; margin: 0;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .dungeon-header .dh-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
    background: var(--bg-tertiary); border: 1px solid var(--border-dim);
    padding: 4px 12px; border-radius: 20px;
  }
  .dungeon-body {
    flex: 1; overflow-y: auto; padding: 24px 28px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; align-content: start;
  }
  .dungeon-body::-webkit-scrollbar { width: 5px; }
  .dungeon-body::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
  .dungeon-card {
    background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--radius-lg);
    padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .dungeon-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
    opacity: 0; transition: opacity 0.2s;
  }
  .dungeon-card:hover { border-color: var(--border-active); background: var(--bg-elevated); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .dungeon-card:hover::before { opacity: 1; }
  .dungeon-card.expanded { border-color: var(--accent-blue); }
  .dc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .dc-name { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; }
  .dc-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .dc-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .dc-badge {
    font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 600;
    padding: 3px 10px; border-radius: 10px; letter-spacing: 0.3px;
  }
  .dc-scenario { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
  .dc-stats { display: flex; gap: 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .dc-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-dim); display: none; }
  .dc-detail.open { display: block; }

  /* Modals & Toasts */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg-secondary); border: 1px solid var(--border-dim);
    border-radius: var(--radius-lg); width: 520px; max-width: 92vw; max-height: 88vh;
    overflow-y: auto; box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97); transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-head {
    padding: 22px 24px 0; display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; margin: 0; }
  .modal-close {
    width: 30px; height: 30px; background: transparent; border: none;
    color: var(--text-dim); font-size: 20px; cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
  .modal-body { padding: 20px 24px 24px; }

  #lightbox-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
    z-index: 20000; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #lightbox-modal.open { opacity: 1; pointer-events: auto; }
  #lightbox-modal img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: var(--radius-md); box-shadow: 0 10px 60px rgba(0,0,0,0.9); }
  .lightbox-close {
    position: absolute; top: 24px; right: 24px; width: 44px; height: 44px;
    background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%; font-size: 22px; cursor: pointer; backdrop-filter: blur(4px);
  }

  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px); z-index: 19999;
    padding: 12px 28px; background: var(--bg-elevated); color: var(--text-primary);
    border: 1px solid var(--accent-green); border-radius: var(--radius-md);
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
    opacity: 0; transition: all 0.35s; pointer-events: none;
    box-shadow: 0 4px 24px rgba(52,211,153,0.2);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--accent-red); box-shadow: 0 4px 24px rgba(248,113,113,0.2); }

  .edit-indicator {
    position: absolute; top: 54px; left: 50%; transform: translateX(-50%); z-index: 100;
    padding: 6px 18px; background: var(--accent-amber-soft);
    border: 1px solid rgba(251,191,36,0.3); border-radius: 20px;
    font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 600;
    color: var(--accent-amber); display: none; pointer-events: none;
    backdrop-filter: blur(8px); letter-spacing: 0.3px;
  }
  .edit-indicator.visible { display: block; }

  .config-section {
    background: var(--bg-tertiary); padding: 16px; border-radius: var(--radius-md);
    border: 1px solid var(--border-dim); margin-bottom: 16px;
  }
  .config-title {
    font-size: 11px; color: var(--accent-blue); font-family: 'Outfit', sans-serif;
    font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .meta-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .meta-item:last-child { border-bottom: none; }

  .no-image {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 12px;
  }

  /* Dungeon empty state */
  .dungeon-empty {
    grid-column: 1 / -1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 80px 0;
    color: var(--text-dim); text-align: center; gap: 14px;
  }
  .dungeon-empty .icon { font-size: 48px; opacity: 0.2; }
</style>
</head>
<body>

<div id="app-root">
  <!-- Global Tab Bar -->
  <div id="global-tabs">
    <div class="gtab-brand">

<!-- ══ Search Modal ══ -->
<div class="search-overlay" id="search-overlay" onclick="if(event.target===this)closeSearchModal()">
  <div class="search-box">

      <span class="search-icon">🔍</span>

      <kbd style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);background:var(--bg-tertiary);border:1px solid var(--border-dim);border-radius:4px;padding:2px 7px;">ESC</kbd>
    </div>

<!-- ══ Settings Modal ══ -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-head"><h3>⚙ 환경 설정</h3><button class="modal-close" onclick="closeSettings()">×</button></div>

        <div class="form-row">

        </div>
        <div class="form-row" style="margin-top:10px;">
          <div class="form-group"><label>파일 경로</label><input class="form-input" id="cfg-path" placeholder="data/mapData.json" value="data/mapData.json"></div>

<div id="lightbox-modal" onclick="if(event.target===this)closeLightbox()"><button class="lightbox-close" onclick="closeLightbox()">×</button><img id="lightbox-img" src="" alt=""></div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
const DUNGEON_TYPE_KEY = 't_dungeon';

const DEFAULT_MAP_DATA = {
  "1001":{ id:"1001", name:"하남성", type:"t_field", pvp:"안전 지역", x:45, y:45, image:"", factions:["f_neutral"], scenario:"안전 지역 / 주요 필드", connected:["1002","1003","1004"], monsters:[], npcs:[] },
  "1002":{ id:"1002", name:"소림사", type:"t_field", pvp:"안전 지역", x:35, y:35, image:"", factions:["f_neutral"], scenario:"안전 지역", connected:["1001"], monsters:[], npcs:[] },
  "1003":{ id:"1003", name:"섬서성", type:"t_field", pvp:"안전 지역", x:25, y:50, image:"", factions:["f_neutral"], scenario:"안전 지역", connected:["1001"], monsters:[], npcs:[] },
  "1004":{ id:"1004", name:"호북성", type:"t_field", pvp:"안전 지역", x:55, y:60, image:"", factions:["f_neutral"], scenario:"일반 필드", connected:["1001"], monsters:[], npcs:[] }
};

let mapData = {};
let typeMeta = {
  "t_field": { label: "필드", color: "#555d74" },
  "t_town": { label: "마을", color: "#4a9eff" },
  "t_dungeon": { label: "던전 및 콘텐츠", color: "#a78bfa" }
};
let factionMeta = { "f_neutral": { label: "기본(중립)" } };

let mode = 'viewer', selectedId = null, mapImgW = 1920, mapImgH = 1080;
let hasUnsavedChanges = false, fileSha = null;
let scale = 1, panX = 0, panY = 0, isPanning = false;
let panStartX, panStartY, panStartPanX, panStartPanY;
const MIN_SCALE = 0.3, MAX_SCALE = 4;
let dragTarget = null, dragStarted = false, dragStartX, dragStartY;
let ghConfig = { token:'', owner:'', repo:'', path:'data/mapData.json', branch:'main', gsApiKey:'', gsSheetId:'', fontSize:13 };
let activeTypeFilters = new Set();
let currentSearchTab = 'all';

// ══ Global Tab switching ══
function switchGlobalTab(tab) {
  document.querySelectorAll('.gtab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.gtab-btn[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'dungeon') renderDungeonBrowser();
}

// ══ Search Modal ══
function openSearchModal() {
  document.getElementById('search-overlay').classList.add('open');
  const inp = document.getElementById('search-input');
  inp.value = ''; inp.focus();
  document.getElementById('search-results').innerHTML = '<div class="search-empty">검색어를 입력하세요</div>';
}
function closeSearchModal() { document.getElementById('search-overlay').classList.remove('open'); }

function setSearchTab(type, btn) {
  currentSearchTab = type;
  document.querySelectorAll('.search-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  performSearch(document.getElementById('search-input').value);
}

function performSearch(query) {
  const results = document.getElementById('search-results');
  query = query.trim().toLowerCase();
  if (!query) { results.innerHTML = '<div class="search-empty">검색어를 입력하세요</div>'; return; }

  let items = [];
  Object.values(mapData).forEach(region => {
    if (currentSearchTab === 'all' || currentSearchTab === 'monster') {
      (region.monsters || []).forEach(m => {
        if ((m.name && m.name.toLowerCase().includes(query)) || (m.idx && m.idx.toLowerCase().includes(query))) {
          items.push({ ...m, kind: 'monster', regionId: region.id, regionName: region.name });
        }
      });
    }
    if (currentSearchTab === 'all' || currentSearchTab === 'npc') {
      (region.npcs || []).forEach(n => {
        if ((n.name && n.name.toLowerCase().includes(query)) || (n.idx && n.idx.toLowerCase().includes(query))) {
          items.push({ ...n, kind: 'npc', regionId: region.id, regionName: region.name });
        }
      });
    }
  });

  if (items.length === 0) {
    results.innerHTML = `<div class="search-empty">「${query}」에 대한 결과가 없습니다</div>`;
    return;
  }

  results.innerHTML = items.slice(0, 80).map(it => {
    const icon = it.kind === 'monster' ? '👾' : '🧑‍🤝‍🧑';
    const highlighted = highlightMatch(it.name || '-', query);
    const kindLabel = it.kind === 'monster' ? '몬스터' : 'NPC';
    return `
      <div class="search-result-item" onclick="navigateToRegion('${it.regionId}')">
        <div class="sr-icon">${icon}</div>
        <div class="sr-info">
          <div class="sr-name">${highlighted}</div>
          <div class="sr-meta">
            <span>${kindLabel}</span>
            ${it.idx ? `<span>IDX: ${it.idx}</span>` : ''}
            ${it.type ? `<span>${it.type}</span>` : ''}
          </div>
        </div>
        <div class="sr-region">${it.regionName}</div>
      </div>
    `;
  }).join('');
}

function highlightMatch(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query);
  if (idx < 0) return text;
  return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + query.length) + '</mark>' + text.substring(idx + query.length);
}

function navigateToRegion(regionId) {
  closeSearchModal();
  switchGlobalTab('map');
  selectRegion(regionId);
}

// ══ Dungeon Browser ══
function renderDungeonBrowser() {
  const body = document.getElementById('dungeon-body');
  const dungeons = Object.values(mapData).filter(r => r.type === DUNGEON_TYPE_KEY);
  document.getElementById('dungeon-count').textContent = dungeons.length + ' Dungeons';

  if (dungeons.length === 0) {
    body.innerHTML = '<div class="dungeon-empty"><div class="icon">🏰</div><p>"던전 및 콘텐츠" 분류에 해당하는 지역이 없습니다.<br><span style="font-size:11px;color:var(--text-dim);">에디터 모드에서 분류를 "던전 및 콘텐츠"로 설정하세요.</span></p></div>';
    return;
  }

  body.innerHTML = dungeons.map(d => {
    const factionLabels = (d.factions||[]).map(fId => factionMeta[fId]?.label || '').filter(Boolean);
    const connNames = (d.connected||[]).map(cid => mapData[cid]?.name).filter(Boolean);
    return `
      <div class="dungeon-card" onclick="toggleDungeonDetail(this)" data-id="${d.id}">
        <div class="dc-top">
          <div>
            <div class="dc-name">${d.name}</div>
            <div class="dc-id">${d.id}</div>
          </div>
        </div>
        <div class="dc-badges">
          ${d.pvp ? `<span class="dc-badge" style="background:rgba(248,113,113,0.12);color:var(--accent-red);">⚔ ${d.pvp}</span>` : ''}
          ${factionLabels.map(l => `<span class="dc-badge" style="background:rgba(138,146,170,0.1);color:var(--text-secondary);">🛡 ${l}</span>`).join('')}
        </div>
        ${d.scenario ? `<div class="dc-scenario">${d.scenario}</div>` : ''}
        <div class="dc-stats">
          <span>몬스터 ${d.monsters?.length || 0}</span>
          <span>NPC ${d.npcs?.length || 0}</span>
          ${connNames.length ? `<span>연결 ${connNames.length}</span>` : ''}
        </div>
        <div class="dc-detail" id="dc-detail-${d.id}">
          ${d.monsters?.length ? `<div style="margin-bottom:12px;"><div class="detail-label">등장 몬스터</div>${generateTable(d.monsters)}</div>` : ''}
          ${d.npcs?.length ? `<div style="margin-bottom:12px;"><div class="detail-label">등장 NPC</div>${generateTable(d.npcs)}</div>` : ''}
          ${connNames.length ? `<div><div class="detail-label">연결된 지역</div><div class="connected-list">${connNames.map(n => `<span class="connected-btn" style="pointer-events:none">${n}</span>`).join('')}</div></div>` : ''}
          <div style="margin-top:12px;">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();switchGlobalTab('map');selectRegion('${d.id}');">맵 에디터에서 열기 →</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleDungeonDetail(card) {
  const detail = card.querySelector('.dc-detail');
  const isOpen = detail.classList.contains('open');
  document.querySelectorAll('.dc-detail.open').forEach(d => { d.classList.remove('open'); d.closest('.dungeon-card').classList.remove('expanded'); });
  if (!isOpen) { detail.classList.add('open'); card.classList.add('expanded'); }
}

// ══ GitHub & API ══
function isGhOk(){ return ghConfig.token && ghConfig.owner && ghConfig.repo && ghConfig.path; }
function ghUrl(){ return `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`; }
function ghHdr(){ return { Authorization:`Bearer ${ghConfig.token}`, Accept:'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }

async function loadFromGithub(){
  if(!isGhOk()) return false;
  setSyncStatus('saving','로딩 중...');
  try{
    const res = await fetch(`${ghUrl()}?ref=${ghConfig.branch}&_=${Date.now()}`,{headers:ghHdr(),cache:'no-store'});
    if(res.status===404){ setSyncStatus('connected','연결됨 (새 파일)'); return false; }
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    fileSha = data.sha;
    const raw = atob(data.content.replace(/\n/g,''));
    const loaded = JSON.parse(new TextDecoder().decode(Uint8Array.from(raw, c=>c.charCodeAt(0))));
    Object.keys(mapData).forEach(k=>delete mapData[k]);
    if(loaded.regions) {
      Object.assign(mapData, loaded.regions);
      if(loaded.types) { Object.keys(typeMeta).forEach(k=>delete typeMeta[k]); Object.assign(typeMeta, loaded.types); }
      if(loaded.factions) { Object.keys(factionMeta).forEach(k=>delete factionMeta[k]); Object.assign(factionMeta, loaded.factions); }
    } else {
      Object.assign(mapData, loaded);
    }
    // Ensure dungeon type exists
    if (!typeMeta[DUNGEON_TYPE_KEY]) {
      typeMeta[DUNGEON_TYPE_KEY] = { label: "던전 및 콘텐츠", color: "#a78bfa" };
    }
    Object.values(mapData).forEach(v => {
      if(!v.type) v.type = "t_field";
      if(!v.factions) { if(v.faction) { v.factions = [v.faction]; delete v.faction; } else v.factions = []; }
    });
    setSyncStatus('connected','동기화됨'); hasUnsavedChanges=false; updateUnsavedDot();
    activeTypeFilters = new Set(Object.keys(typeMeta));
    activeTypeFilters.delete(DUNGEON_TYPE_KEY); // 던전은 맵 필터에서 기본 비활성
    renderFilterBar();
    return true;
  }catch(e){ setSyncStatus('error','로드 실패'); return false; }
}

async function saveToGithub(){
  if(!isGhOk()){ openSettings(); showToast('GitHub 연결을 설정해주세요.',true); return; }
  setSyncStatus('saving','저장 중...');
  const btn=document.getElementById('btn-save-github'); if(btn){btn.classList.add('saving');btn.textContent='⏳ 저장 중...';}
  try{
    const cleanRegions={};
    Object.entries(mapData).forEach(([k,v])=>{
      cleanRegions[k]={ id:v.id, name:v.name, type:v.type||'', pvp:v.pvp||'', x:Math.round(v.x*10)/10, y:Math.round(v.y*10)/10, image:v.image, factions:v.factions||[], scenario:v.scenario, connected:v.connected||[], monsters:v.monsters||[], npcs:v.npcs||[] };
    });
    const payload = { regions: cleanRegions, types: typeMeta, factions: factionMeta };
    const json=JSON.stringify(payload,null,2);
    const b64=btoa(unescape(encodeURIComponent(json)));
    try{ const cr=await fetch(`${ghUrl()}?ref=${ghConfig.branch}&_=${Date.now()}`,{headers:ghHdr(),cache:'no-store'}); if(cr.ok) fileSha=(await cr.json()).sha; else if(cr.status===404) fileSha=null; }catch(e){}
    const body={message:`Update Map Data — ${new Date().toLocaleString('ko-KR')}`,content:b64,branch:ghConfig.branch};
    if(fileSha) body.sha=fileSha;
    const res=await fetch(ghUrl(),{method:'PUT',headers:{...ghHdr(),'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    fileSha=(await res.json()).content.sha;
    hasUnsavedChanges=false; updateUnsavedDot(); setSyncStatus('connected','동기화됨'); showToast('✅ GitHub 저장 완료');
  }catch(e){
    setSyncStatus('error','저장 실패'); showToast('저장 실패: '+e.message,true);
  }finally{ if(btn){btn.classList.remove('saving');btn.textContent='💾 전체 저장';} }
}

// ══ Google Sheets ══
async function syncGoogleSheet() {
  if(!selectedId || !mapData[selectedId]) return;
  if(!ghConfig.gsApiKey || !ghConfig.gsSheetId) return showToast("설정에서 Google Sheets API 설정을 완료해주세요.", true);
  const rId = mapData[selectedId].id;
  const encodedRange = encodeURIComponent(`'${rId}'!A21:M`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${ghConfig.gsSheetId}/values/${encodedRange}?key=${ghConfig.gsApiKey}`;
  const btn = document.getElementById('btn-gs-sync');
  if(btn) { btn.textContent = '⏳ 동기화 중...'; btn.style.pointerEvents='none'; }
  try {
    const res = await fetch(url);
    if(!res.ok) { const errData = await res.json().catch(()=>({})); throw new Error(`API 거부 사유: ${errData.error?.message || res.status}`); }
    const data = await res.json();
    const rows = data.values || [];
    let monsters = [], npcs = [];
    for(let i=1; i<rows.length; i++) {
      const r = rows[i];
      if(r[0] || r[1]) monsters.push({ idx:r[0]||'', name:r[1]||'', type:r[2]||'', file:r[3]||'', img:r[4]||'' });
      if(r[8] || r[9]) npcs.push({ idx:r[8]||'', name:r[9]||'', type:r[10]||'', file:r[11]||'', img:r[12]||'' });
    }
    mapData[selectedId].monsters = monsters;
    mapData[selectedId].npcs = npcs;
    markDirty(); renderEditorDetail(); showToast(`✅ 시트 "${rId}" 데이터 연동 성공!`);
  } catch(e) { showToast("❌ " + e.message, true); } finally { if(btn) { btn.textContent = '☁️ 시트 데이터 동기화'; btn.style.pointerEvents='auto'; } }
}

function setSyncStatus(s,l){ const el=document.getElementById('sync-status'); el.className='sync-status '+s; document.getElementById('sync-label').textContent=l; }
function markDirty(){ hasUnsavedChanges=true; updateUnsavedDot(); if(isGhOk()) setSyncStatus('connected','변경사항 있음'); }
function updateUnsavedDot(){ document.getElementById('unsaved-dot').classList.toggle('visible',hasUnsavedChanges); }

function loadGhCfg(){ try{ const s=localStorage.getItem('wm_gh_cfg'); if(s){ ghConfig={...ghConfig,...JSON.parse(s)}; document.documentElement.style.setProperty('--marker-font-size', ghConfig.fontSize+'px'); } }catch(e){} }
function openSettings(){
  document.getElementById('cfg-token').value=ghConfig.token; document.getElementById('cfg-owner').value=ghConfig.owner;
  document.getElementById('cfg-repo').value=ghConfig.repo; document.getElementById('cfg-path').value=ghConfig.path;
  document.getElementById('cfg-branch').value=ghConfig.branch;
  document.getElementById('cfg-gs-key').value=ghConfig.gsApiKey; document.getElementById('cfg-gs-id').value=ghConfig.gsSheetId;
  document.getElementById('cfg-font').value=ghConfig.fontSize; document.getElementById('font-size-val').textContent=ghConfig.fontSize;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){ document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings(){
  ghConfig.token=document.getElementById('cfg-token').value.trim(); ghConfig.owner=document.getElementById('cfg-owner').value.trim();
  ghConfig.repo=document.getElementById('cfg-repo').value.trim(); ghConfig.path=document.getElementById('cfg-path').value.trim()||'data/mapData.json';
  ghConfig.branch=document.getElementById('cfg-branch').value.trim()||'main';
  ghConfig.gsApiKey=document.getElementById('cfg-gs-key').value.trim(); ghConfig.gsSheetId=document.getElementById('cfg-gs-id').value.trim();

// ══ Init ══
window.addEventListener('DOMContentLoaded', async()=>{
  loadGhCfg(); Object.assign(mapData, JSON.parse(JSON.stringify(DEFAULT_MAP_DATA)));
  activeTypeFilters = new Set(Object.keys(typeMeta));
  activeTypeFilters.delete(DUNGEON_TYPE_KEY);

  img.onload=()=>{ mapImgW=img.naturalWidth||1920; mapImgH=img.naturalHeight||1080; initViewport(); renderAll(); };

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); openSearchModal(); }
  if(e.key==='Escape'){ closeSearchModal(); closeLightbox(); closeSettings(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(hasUnsavedChanges)saveToGithub();}
});

function initViewport(){
  const vp=document.getElementById('map-viewport'), img=document.getElementById('world-image'), c=document.getElementById('map-container');
  img.style.width=mapImgW+'px'; img.style.height=mapImgH+'px'; vp.style.width=mapImgW+'px'; vp.style.height=mapImgH+'px';
  scale=Math.min(c.clientWidth/mapImgW,c.clientHeight/mapImgH)*0.9;
  panX=(c.clientWidth-mapImgW*scale)/2; panY=(c.clientHeight-mapImgH*scale)/2; applyTransform();
}
function applyTransform(){ document.getElementById('map-viewport').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`; document.getElementById('zoom-level').textContent=Math.round(scale*100)+'%'; }
function setupPanZoom(){
  const c=document.getElementById('map-container');
  c.addEventListener('pointerdown',e=>{
    if(e.button===1||(e.button===0&&!isMarkerEl(e.target))){ if(mode==='editor'&&isMarkerEl(e.target))return; isPanning=true; panStartX=e.clientX; panStartY=e.clientY; panStartPanX=panX; panStartPanY=panY; c.classList.add('panning'); c.setPointerCapture(e.pointerId); }
  });
  c.addEventListener('pointermove',e=>{ if(isPanning){panX=panStartPanX+(e.clientX-panStartX);panY=panStartPanY+(e.clientY-panStartY);applyTransform();return;} if(dragTarget)handleDragMove(e); });
  c.addEventListener('pointerup',e=>{ if(isPanning){isPanning=false;c.classList.remove('panning');} if(dragTarget)handleDragEnd(e); });
  c.addEventListener('wheel',e=>{ e.preventDefault(); const r=c.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top, old=scale; scale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,scale*(e.deltaY>0?0.9:1.1))); panX=mx-(mx-panX)*(scale/old); panY=my-(my-panY)*(scale/old); applyTransform(); },{passive:false});
}
function isMarkerEl(el){return el.closest('.map-marker')!==null;}
function zoomIn(){const c=document.getElementById('map-container'),cx=c.clientWidth/2,cy=c.clientHeight/2,o=scale;scale=Math.min(MAX_SCALE,scale*1.3);panX=cx-(cx-panX)*(scale/o);panY=cy-(cy-panY)*(scale/o);applyTransform();}
function zoomOut(){const c=document.getElementById('map-container'),cx=c.clientWidth/2,cy=c.clientHeight/2,o=scale;scale=Math.max(MIN_SCALE,scale/1.3);panX=cx-(cx-panX)*(scale/o);panY=cy-(cy-panY)*(scale/o);applyTransform();}
function zoomReset(){initViewport();}

// ══ Render ══
function renderFilterBar() {
  const bar = document.getElementById('filter-bar'); bar.innerHTML = '';
  Object.entries(typeMeta).forEach(([k,v]) => {
    if (k === DUNGEON_TYPE_KEY) return; // 던전은 필터바에 표시하지 않음
    const btn = document.createElement('button');
    btn.className = `filter-btn ${activeTypeFilters.has(k) ? 'active' : ''}`;
    btn.style.setProperty('--c', v.color); btn.textContent = v.label;
    btn.onclick = () => {
      if(activeTypeFilters.has(k)) activeTypeFilters.delete(k); else activeTypeFilters.add(k);
      btn.classList.toggle('active', activeTypeFilters.has(k)); renderMarkers(); renderConnections();
    };
    bar.appendChild(btn);
  });
}

function renderAll(){ renderFilterBar(); renderMarkers(); renderConnections(); updateStats(); if(selectedId&&!mapData[selectedId])selectedId=null; renderDetail(); }

function renderMarkers(){
  const layer=document.getElementById('markers-layer'); layer.innerHTML='';
  Object.values(mapData).forEach(region=>{
    // 던전 타입은 맵에 절대 표시하지 않음
    if(region.type === DUNGEON_TYPE_KEY) return;
    if(!activeTypeFilters.has(region.type)) return;
    const el=document.createElement('div');
    el.className='map-marker'+(region.id===selectedId?' selected':''); el.dataset.id=region.id;
    el.style.left=(region.x/100*mapImgW)+'px'; el.style.top=(region.y/100*mapImgH)+'px';
    const col = typeMeta[region.type]?.color || '#555d74';
    el.innerHTML=`<div class="marker-pin"><svg viewBox="0 0 28 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 24 14 24s14-13.5 14-24C28 6.268 21.732 0 14 0z" fill="${col}"/><circle cx="14" cy="13" r="6" fill="rgba(0,0,0,0.3)"/><circle cx="14" cy="13" r="4" fill="#fff" opacity="0.9"/></svg></div><div class="marker-label">${region.name}</div>`;
    el.addEventListener('pointerdown',e=>{if(mode==='editor'){e.stopPropagation();handleDragStart(e,region.id);}});
    el.addEventListener('click',()=>{ if(!dragTarget) { if(selectedId === region.id) { selectedId = null; renderAll(); } else { selectRegion(region.id); } } });
    layer.appendChild(el);
  });
}

function renderConnections(){
  const svg=document.getElementById('connections-svg');
  svg.setAttribute('width',mapImgW);svg.setAttribute('height',mapImgH); svg.style.width=mapImgW+'px';svg.style.height=mapImgH+'px';svg.innerHTML='';
  const drawn=new Set();
  Object.values(mapData).forEach(r=>{
    if(r.type === DUNGEON_TYPE_KEY) return;
    if(!activeTypeFilters.has(r.type)) return;
    (r.connected||[]).forEach(tid=>{
      const t=mapData[tid]; if(!t || t.type === DUNGEON_TYPE_KEY || !activeTypeFilters.has(t.type)) return;
      const k=[r.id,tid].sort().join('|');if(drawn.has(k))return;drawn.add(k);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',r.x/100*mapImgW);line.setAttribute('y1',r.y/100*mapImgH);
      line.setAttribute('x2',t.x/100*mapImgW);line.setAttribute('y2',t.y/100*mapImgH);
      if(selectedId&&(r.id===selectedId||tid===selectedId))line.classList.add('highlight');
      svg.appendChild(line);
    });
  });
}

function selectRegion(id){ selectedId=id; renderMarkers(); renderConnections(); renderDetail(); }

function renderDetail(){
  const body=document.getElementById('panel-body'), actions=document.getElementById('panel-actions');
  if(!selectedId||!mapData[selectedId]){
    if(mode==='editor'){
      actions.innerHTML=`<button class="btn btn-save btn-sm" id="btn-save-github" onclick="saveToGithub()">💾 전체 저장</button><button class="btn btn-success btn-sm" onclick="addRegion()">+ 신규 지역</button>`;
      body.innerHTML=`<div class="empty-state"><div class="icon">✏️</div><p>마커를 클릭하여 편집하거나<br>새 지역을 추가하세요</p><button class="btn btn-success" onclick="addRegion()" style="margin-top:8px;">+ 신규 지역 추가</button></div>`;
    }else{
      actions.innerHTML=''; body.innerHTML=`<div class="empty-state"><div class="icon">🗺</div><p>마커를 클릭하여<br>지역 정보를 확인하세요</p></div>`;
    }
    return;
  }
  if(mode==='viewer')renderViewerDetail();else renderEditorDetail();
}

function generateTable(arr) {
  if(!arr || arr.length === 0) return '<div class="detail-value" style="color:var(--text-dim)">데이터 없음</div>';
  const trs = arr.map(i => `
    <tr>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--text-dim);text-align:center;">${i.idx||'-'}</td>
      <td style="font-weight:600;">${i.name||'-'}</td>
      <td>${i.type||'-'}</td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:10px;word-break:break-all;">${i.file||'-'}</td>
    </tr>`).join('');
  return `<table class="data-table" style="table-layout:fixed;width:100%;"><thead><tr><th style="width:15%;text-align:center;">인덱스</th><th style="width:35%;">이름</th><th style="width:20%;">타입</th><th style="width:30%;">파일명</th></tr></thead><tbody>${trs}</tbody></table>`;
}

// ── Edit Ops ──
function updateField(f,v){if(!selectedId||!mapData[selectedId])return;mapData[selectedId][f]=v;markDirty();if(f==='name'||f==='type')renderMarkers();}
function updateTypeColor(tId, hex) { if(typeMeta[tId]) { typeMeta[tId].color = hex; markDirty(); renderFilterBar(); renderMarkers(); } }
function manageType(tId) {
  const meta = typeMeta[tId];
  const act = prompt(`분류 관리 [${meta.label}]\n1: 이름 변경\n2: 새 분류 추가\n3: 이 분류 삭제\n원하는 번호를 입력하세요:`);
  if(act === '1') { const n = prompt('새 이름을 입력하세요:', meta.label); if(n){ meta.label=n.trim(); markDirty(); renderAll(); } }
  else if(act === '2') {
    const n = prompt('새로 추가할 분류 이름을 입력하세요:');
    if(n) { const nid = 't_'+Date.now(); typeMeta[nid]={label:n.trim(), color:'#8a92a8'}; activeTypeFilters.add(nid); markDirty(); renderAll(); }
  }
  else if(act === '3') {
    if(tId === DUNGEON_TYPE_KEY) return alert('"던전 및 콘텐츠" 분류는 삭제할 수 없습니다.');
    if(Object.keys(typeMeta).length <= 1) return alert('최소 1개의 분류는 남아있어야 합니다.');
    if(confirm(`"${meta.label}" 분류를 삭제하시겠습니까?`)) {
      delete typeMeta[tId]; activeTypeFilters.delete(tId);
      const fallback = Object.keys(typeMeta)[0];
      Object.values(mapData).forEach(r => { if(r.type === tId) r.type = fallback; });
      markDirty(); renderAll(); showToast('분류가 삭제되었습니다.');
    }
  }
}
function toggleFaction(fId, isChecked) { const r=mapData[selectedId]; if(!r.factions) r.factions=[]; if(isChecked){ if(!r.factions.includes(fId)) r.factions.push(fId); } else r.factions=r.factions.filter(id=>id!==fId); markDirty(); }
function addFaction() { const n=prompt('새 세력 이름:'); if(n){ factionMeta['f_'+Date.now()]={label:n.trim()}; markDirty(); renderEditorDetail(); } }
function renameFaction(fId) { const n=prompt('새 이름:', factionMeta[fId].label); if(n){ factionMeta[fId].label=n.trim(); markDirty(); renderEditorDetail(); } }
function deleteFaction(fId) {
  if(!confirm(`"${factionMeta[fId].label}" 세력을 삭제하시겠습니까?`)) return;
  delete factionMeta[fId]; Object.values(mapData).forEach(r=>{ if(r.factions) r.factions=r.factions.filter(id=>id!==fId); }); markDirty(); renderEditorDetail();
}
function updateRegionId(oldId, newId) {
  newId=newId.trim().replace(/[^a-zA-Z0-9_]/g,'_'); if(!newId||newId===oldId) return;
  if(mapData[newId]){ showToast('이미 존재하는 ID입니다.',true); renderEditorDetail(); return; }
  mapData[newId]={...mapData[oldId],id:newId}; delete mapData[oldId];
  Object.values(mapData).forEach(r=>{ if(r.connected&&r.connected.includes(oldId)) r.connected=r.connected.map(id=>id===oldId?newId:id); });
  selectedId=newId; markDirty(); renderAll(); showToast('✅ ID가 변경되었습니다.');
}
function toggleConnection(tid,chk){
  const r=mapData[selectedId]; if(!r.connected)r.connected=[];
  if(chk){ if(!r.connected.includes(tid))r.connected.push(tid); if(!mapData[tid].connected)mapData[tid].connected=[]; if(!mapData[tid].connected.includes(selectedId))mapData[tid].connected.push(selectedId); }
  else{ r.connected=r.connected.filter(id=>id!==tid); if(mapData[tid]?.connected)mapData[tid].connected=mapData[tid].connected.filter(id=>id!==selectedId); }
  markDirty();renderConnections();updateStats();
}
function addRegion(){
  let nid='region_'+Date.now().toString(36); const p=prompt('새 지역 ID (영문/숫자):',nid);
  if(!p)return; nid=p.trim().replace(/[^a-zA-Z0-9_]/g,'_'); if(mapData[nid]) return alert('이미 존재하는 ID입니다.');
  const defType=Object.keys(typeMeta)[0];
  mapData[nid]={id:nid,name:'새 지역',type:defType,pvp:'',x:50,y:50,image:'',factions:[],scenario:'',connected:[],monsters:[],npcs:[]};
  selectedId=nid; markDirty(); renderAll(); showToast('새 지역이 추가되었습니다');
}
function deleteRegion(){
  if(!selectedId||!mapData[selectedId])return;
  const name=mapData[selectedId].name; if(!confirm(`"${name}" 지역을 삭제하시겠습니까?`))return;
  Object.values(mapData).forEach(r=>{if(r.connected)r.connected=r.connected.filter(id=>id!==selectedId);});
  delete mapData[selectedId]; selectedId=null; markDirty(); renderAll(); showToast(`"${name}" 삭제됨`);
}
function handleDragStart(e,id){if(mode!=='editor')return;dragTarget=id;dragStarted=false;dragStartX=e.clientX;dragStartY=e.clientY;document.getElementById('map-container').setPointerCapture(e.pointerId);}
function handleDragMove(e){
  if(!dragTarget)return;
  if(!dragStarted&&Math.abs(e.clientX-dragStartX)+Math.abs(e.clientY-dragStartY)<5)return;
  dragStarted=true; const c=document.getElementById('map-container'),r=c.getBoundingClientRect();
  const xP=Math.max(0,Math.min(100,(e.clientX-r.left-panX)/scale/mapImgW*100)), yP=Math.max(0,Math.min(100,(e.clientY-r.top-panY)/scale/mapImgH*100));
  mapData[dragTarget].x=xP; mapData[dragTarget].y=yP;
  const m=document.querySelector(`.map-marker[data-id="${dragTarget}"]`); if(m){m.style.left=(xP/100*mapImgW)+'px';m.style.top=(yP/100*mapImgH)+'px';m.classList.add('dragging');} renderConnections();
}
function handleDragEnd(e){
  if(!dragTarget)return;
  const id=dragTarget,was=dragStarted; dragTarget=null; dragStarted=false;
  const m=document.querySelector(`.map-marker[data-id="${id}"]`);if(m)m.classList.remove('dragging');
  if(was){markDirty();if(selectedId===id)renderDetail();renderMarkers();}else selectRegion(id);
}
function setMode(m){
  mode=m; document.getElementById('btn-viewer').classList.toggle('active',m==='viewer'); document.getElementById('btn-editor').classList.toggle('active',m==='editor');
  document.getElementById('edit-indicator').classList.toggle('visible',m==='editor'); document.getElementById('map-container').classList.toggle('edit-mode',m==='editor');
  document.getElementById('panel-title').textContent=m==='viewer'?'Region Details':'Region Editor'; renderDetail();
}
function updateStats(){
  const n=Object.keys(mapData).length,cs=new Set();
  Object.values(mapData).forEach(r=>(r.connected||[]).forEach(c=>cs.add([r.id,c].sort().join('|'))));
  document.getElementById('stat-count').textContent=n;document.getElementById('stat-conn').textContent=cs.size;
}
function openLightbox(src) { if(!src)return; document.getElementById('lightbox-img').src=src; document.getElementById('lightbox-modal').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox-modal').classList.remove('open'); setTimeout(()=>document.getElementById('lightbox-img').src='',250); }
let toastTimer;
function showToast(msg,err){ const t=document.getElementById('toast');t.textContent=msg;t.className=err?'error':''; clearTimeout(toastTimer);requestAnimationFrame(()=>{t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}); }
</script>
</body>
</html>
