<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드맵 레퍼런스 뷰어</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: sans-serif; background-color: #1e1e1e; color: #fff; }
        
        /* 왼쪽 월드맵 영역 */
        #map-container { position: relative; width: 60%; height: 100%; overflow: auto; border-right: 2px solid #333; background-color: #2a2a2a; }
        #world-map-image { width: 100%; height: auto; display: block; }
        
        /* 맵 마커(클릭 가능한 지역 핀) */
        .map-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff3333;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .map-marker:hover { background-color: #ffaaaa; }
        .map-marker-label {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 오른쪽 상세 정보 영역 */
        #detail-container { width: 40%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; background-color: #222; }
        #detail-title { margin-top: 0; font-size: 24px; color: #4CAF50; border-bottom: 1px solid #4CAF50; padding-bottom: 10px; }
        #detail-image { width: 100%; height: auto; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-weight: bold; color: #aaa; margin-bottom: 5px; display: block; }
        .info-content { background-color: #333; padding: 10px; border-radius: 4px; line-height: 1.5; }
        
        /* 연결된 지역 버튼 */
        .connected-btn {
            background-color: #4CAF50; color: white; border: none; padding: 8px 12px;
            margin: 5px 5px 0 0; border-radius: 4px; cursor: pointer;
        }
        .connected-btn:hover { background-color: #45a049; }
        
        #empty-state { text-align: center; color: #777; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="map-container">
        <img id="world-map-image" src="worldmap_china.png" alt="월드맵">
        <div id="markers-layer"></div>
    </div>

    <div id="detail-container">
        <div id="empty-state">월드맵에서 지역을 선택하세요.</div>
        <div id="detail-content" style="display: none;">
            <h2 id="detail-title">지역 이름</h2>
            <img id="detail-image" src="" alt="지역 상세 이미지">
            
            <div class="info-group">
                <span class="info-label">대표 세력</span>
                <div id="detail-faction" class="info-content">세력 정보</div>
            </div>
            
            <div class="info-group">
                <span class="info-label">지역 시나리오 및 컨셉</span>
                <div id="detail-scenario" class="info-content">시나리오 정보</div>
            </div>

            <div class="info-group">
                <span class="info-label">연결된 지역</span>
                <div id="detail-connected"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // [데이터 수정 구역] 레벨 디자이너 수정 영역
        // ==========================================
        const mapData = {
            "regionA": {
                name: "시작의 계곡",
                x: 25, // 월드맵 이미지 상의 X 좌표 (왼쪽 기준 백분율 %)
                y: 40, // 월드맵 이미지 상의 Y 좌표 (위쪽 기준 백분율 %)
                image: "regionA_detail.jpg", // 지역 상세 이미지 파일명
                faction: "붉은 늑대 용병단",
                scenario: "튜토리얼이 진행되는 평화로운 계곡. 16개의 프리팹 중 주로 초원과 얕은 물가 터레인으로 구성됨.",
                connected: ["regionB", "regionC"] // 연결된 지역의 ID
            },
            "regionB": {
                name: "바람의 고원",
                x: 45,
                y: 35,
                image: "regionB_detail.jpg",
                faction: "바람을 섬기는 유목민",
                scenario: "시작의 계곡에서 북동쪽으로 이어지는 거친 고원지대.",
                connected: ["regionA"]
            },
            "regionC": {
                name: "버려진 광산",
                x: 30,
                y: 60,
                image: "regionC_detail.jpg",
                faction: "언데드 광부",
                scenario: "어둡고 습한 지하 광산 컨셉. 씬 전환 시 조명 변화가 큼.",
                connected: ["regionA"]
            }
        };
        // ==========================================
        // [로직 구역] 아래는 수정할 필요가 없습니다.
        // ==========================================

        const markersLayer = document.getElementById('markers-layer');
        const emptyState = document.getElementById('empty-state');
        const detailContent = document.getElementById('detail-content');
        
        function initMap() {
            markersLayer.innerHTML = '';
            for (const [id, data] of Object.entries(mapData)) {
                const marker = document.createElement('div');
                marker.className = 'map-marker';
                marker.style.left = data.x + '%';
                marker.style.top = data.y + '%';
                marker.onclick = () => showDetail(id);

                const label = document.createElement('div');
                label.className = 'map-marker-label';
                label.innerText = data.name;
                
                marker.appendChild(label);
                markersLayer.appendChild(marker);
            }
        }

        function showDetail(id) {
            const data = mapData[id];
            if (!data) return;

            emptyState.style.display = 'none';
            detailContent.style.display = 'block';

            document.getElementById('detail-title').innerText = data.name;
            document.getElementById('detail-image').src = data.image;
            document.getElementById('detail-faction').innerText = data.faction;
            document.getElementById('detail-scenario').innerText = data.scenario;

            const connectedContainer = document.getElementById('detail-connected');
            connectedContainer.innerHTML = '';
            
            data.connected.forEach(connectedId => {
                if (mapData[connectedId]) {
                    const btn = document.createElement('button');
                    btn.className = 'connected-btn';
                    btn.innerText = mapData[connectedId].name;
                    btn.onclick = () => showDetail(connectedId);
                    connectedContainer.appendChild(btn);
                }
            });
        }

        // 초기화 실행
        initMap();
    </script>
</body>
</html>
